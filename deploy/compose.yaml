# Composer - Self-hosting Docker Compose file
#
# This is the full Postgres+Valkey deployment. For a simpler setup with SQLite,
# just run the composer service alone (remove postgres/valkey and unset DB_URL).
#
# Usage:
#   docker compose -f deploy/compose.yaml up -d
#
# All config via environment variables.
# Set PUID/PGID for Unraid/NAS compatibility.
# Docker socket GID is auto-detected or set via DOCKER_GID.

services:
  composer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # Multi-arch manifest list — resolves to the right platform (amd64/arm64).
    # Use :latest-amd64 or :latest-arm64 if you want to pin a platform (e.g.
    # to update before the slower QEMU arm64 build finishes).
    image: ghcr.io/erfianugrah/composer:latest
    ports:
      - "${COMPOSER_PORT:-8080}:8080"
    volumes:
      # Docker socket -- NOT :ro (read-only is security theater on unix sockets;
      # Composer needs write access for compose up/down/restart anyway)
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - stacks:/opt/stacks
      - composer_data:/opt/composer
      - composer_ssh:/home/composer/.ssh
    environment:
      # User/group mapping (Unraid: 99/100, default: 1000/1000)
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      DOCKER_GID: ${DOCKER_GID:-}
      # Application config
      COMPOSER_PORT: "8080"
      COMPOSER_DB_URL: "postgres://composer:${POSTGRES_PASSWORD:-composer}@postgres:5432/composer?sslmode=disable"
      COMPOSER_VALKEY_URL: "valkey://valkey:6379"
      COMPOSER_STACKS_DIR: "/opt/stacks"
      COMPOSER_LOG_FORMAT: "${LOG_FORMAT:-json}"
      COMPOSER_LOG_LEVEL: "${LOG_LEVEL:-info}"
      # WARNING: Set to "true" for production behind HTTPS. Code defaults to true
      # unless explicitly set to "false", but this compose override defaults false
      # for local development without TLS.
      COMPOSER_COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      COMPOSER_ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
      COMPOSER_TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped
    # Security hardening
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Required for entrypoint PUID/PGID adjustments (usermod/groupmod/su-exec)
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: composer
      # WARNING: Change for production! Default "composer" is for local dev only.
      # Set POSTGRES_PASSWORD env var before deploying.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-composer}
      POSTGRES_DB: composer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U composer"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  stacks:
  composer_data:
  composer_ssh:
