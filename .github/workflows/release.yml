name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Test + build Go binaries ──────────────────────────────────
  test-and-build:
    name: Test & Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: mkdir -p web/dist && echo '<!-- placeholder -->' > web/dist/index.html

      - name: Unit tests
        run: go test -count=1 -timeout=2m ./internal/domain/... ./internal/app/... ./internal/infra/eventbus/... ./internal/infra/crypto/... ./internal/infra/sops/... ./internal/infra/cache/... ./internal/infra/notify/...

      - name: Build linux/amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o composerd-linux-amd64 ./cmd/composerd/

      - name: Build linux/arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o composerd-linux-arm64 ./cmd/composerd/

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: composerd-linux-*
          retention-days: 1

  # ── Docker: build each platform in parallel ───────────────────
  # Each platform pushes its own tagged image immediately so you can
  # pull e.g. ghcr.io/erfianugrah/composer:0.5.2-amd64 without
  # waiting for arm64 QEMU to finish.
  docker-build:
    name: Docker (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: test-and-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
        if: matrix.platform != 'linux/amd64'

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Docker meta (per-platform tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Per-platform tags: e.g. 0.5.2-amd64, latest-amd64
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.suffix }}
            type=raw,value=latest-${{ matrix.suffix }}

      - name: Build and push (platform-specific tag)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.suffix }}
          cache-to: type=gha,scope=build-${{ matrix.suffix }},mode=max

      # Also push by digest for the manifest merge step
      - name: Push by digest
        id: digest
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.suffix }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.digest.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Docker: merge into multi-arch manifest ────────────────────
  # Creates the unified tags (0.5.2, 0.5, 0, latest) that resolve
  # to the correct platform automatically via manifest list.
  docker-merge:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (multi-arch tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  # ── GitHub Release with binary artifacts ──────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [test-and-build, docker-merge]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            composerd-linux-amd64
            composerd-linux-arm64
