name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run build
        working-directory: web
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - name: Verify TS client is up to date
        run: |
          make generate
          git diff --exit-code -- web/src/lib/api/openapi.json web/src/lib/api/types.ts || (
            echo "::error::Generated OpenAPI spec / TS types are out of date. Run 'make generate' and commit the result."
            exit 1
          )

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: mkdir -p web/dist && echo '<!-- placeholder -->' > web/dist/index.html
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -count=1 -timeout=2m ./internal/domain/... ./internal/app/... ./internal/infra/eventbus/... ./internal/infra/crypto/... ./internal/infra/sops/... ./internal/infra/cache/... ./internal/infra/notify/...

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: mkdir -p web/dist && echo '<!-- placeholder -->' > web/dist/index.html
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags=integration -count=1 -timeout=10m -p 1 ./...

  test-frontend:
    name: Frontend Build + Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run build
        working-directory: web
      - run: bunx playwright install --with-deps chromium
        working-directory: web
      - run: bun run test
        working-directory: web
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: web/test-results/
          retention-days: 7

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - run: mkdir -p web/dist && echo '<!-- placeholder -->' > web/dist/index.html
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o /dev/null ./cmd/composerd/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: composer:ci
